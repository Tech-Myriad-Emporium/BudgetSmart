# BudgetSmart central account + entitlement API (Cloudflare Worker + D1).
# The authority for identity, email verification, and subscription state.
# Both the marketing site and the desktop app talk to this.
name = "budgetsmart-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "budgetsmart-accounts"
database_id = "af51f705-52ec-46b1-8a7e-e5ee2c154034"

# Serve downloads (installer) via the R2 binding — R2's public HTTP serving was
# unreliable on this account, but the binding uses the working data plane.
[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "budgetsmart-downloads"

[vars]
APP_URL = "https://budgetsmarttme.com"
API_ORIGIN = "https://budgetsmart-api.budgetsmart.workers.dev"
EMAIL_FROM = "BudgetSmart <budgetsmart.techmyriademporium@gmail.com>"
GMAIL_USER = "budgetsmart.techmyriademporium@gmail.com"
GOOGLE_CLIENT_ID = "581157140324-bsc6n9hm2p5862ro04525hslhusafj66.apps.googleusercontent.com"
# Stripe price ids (test mode) — monthly + annual per tier
STRIPE_PRICE_IND_T1_MONTH = "price_1ToXRA0dUdkblRR7bAaOSjEM"
STRIPE_PRICE_IND_T1_YEAR  = "price_1ToXRA0dUdkblRR7t6FF5Gca"
STRIPE_PRICE_IND_T2_MONTH = "price_1ToXRA0dUdkblRR7TCJNuZEm"
STRIPE_PRICE_IND_T2_YEAR  = "price_1ToXRA0dUdkblRR7JAJvZjVw"
STRIPE_PRICE_IND_T3_MONTH = "price_1ToXRB0dUdkblRR7CKh5jlbE"
STRIPE_PRICE_IND_T3_YEAR  = "price_1ToXRB0dUdkblRR73ioHQDrk"
STRIPE_PRICE_FAM_T1_MONTH = "price_1ToXRB0dUdkblRR789d5K5dI"
STRIPE_PRICE_FAM_T1_YEAR  = "price_1ToXRC0dUdkblRR7DtUR9ykj"
STRIPE_PRICE_FAM_T2_MONTH = "price_1ToXRC0dUdkblRR789lsgzxM"
STRIPE_PRICE_FAM_T2_YEAR  = "price_1ToXRC0dUdkblRR7FUcjjRvh"
STRIPE_PRICE_FAM_T3_MONTH = "price_1ToXRC0dUdkblRR7TBQ5Rftd"
STRIPE_PRICE_FAM_T3_YEAR  = "price_1ToXRC0dUdkblRR7en4fECKi"
# Secrets (wrangler secret put): GMAIL_APP_PASSWORD, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# Stripe price ids are set as vars once the products exist (see scripts/stripe-setup).
# Secrets (wrangler secret put): JWT_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY

[triggers]
crons = ["*/2 * * * *"]
