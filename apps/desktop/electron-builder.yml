# electron-builder config — used in CI (clean Linux runner) to produce the
# Linux AppImage/.deb. The local Windows build still uses pack-manual + NSIS.
appId: com.techmyriademporium.budgetsmart
productName: BudgetSmart
directories:
  output: dist-eb
  buildResources: build
# The app itself is just the Electron shell; the backend + web + bundled Node
# runtime ride along as extraResources (staged by stage.mjs before this runs).
files:
  - electron.js
  - preload.js
  - splash.html
  - tips-browser.js
  - BudgetSmart.gif
  - icon.png
  - package.json
extraResources:
  - from: app-resources
    to: app-resources
linux:
  target:
    - AppImage
    - deb
  category: Finance
  icon: build/icon.png
  maintainer: Tech Myriad Emporium <jaydenrobinson727@gmail.com>
  synopsis: All-in-one personal finance app
mac:
  target:
    - dmg
  category: public.app-category.finance
  icon: build/icon.png
  # unsigned beta builds — users right-click → Open the first time
  identity: null
dmg:
  title: BudgetSmart
