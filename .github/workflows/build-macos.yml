name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  mac:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm --prefix shared install --no-audit --no-fund
          npm run build:shared
          npm --prefix backend install --no-audit --no-fund
          npm --prefix apps/web install --no-audit --no-fund
          npm run link:shared
          npm --prefix apps/desktop install --no-audit --no-fund

      - name: Build backend + web
        run: |
          npm --prefix backend run build
          npm --prefix apps/web run build

      - name: Stage app resources (bundles the macOS Node runtime)
        run: |
          cd apps/desktop
          node stage.mjs
          chmod +x app-resources/node

      - name: Build macOS dmg (unsigned beta)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: cd apps/desktop && npx electron-builder --mac --${{ matrix.arch }} --config electron-builder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetsmart-macos-${{ matrix.arch }}
          path: apps/desktop/dist-eb/*.dmg
          if-no-files-found: error

      - name: Publish dmg to the download link
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          f=$(ls apps/desktop/dist-eb/*.dmg | head -1)
          node scripts/r2-upload.mjs "$f" "BudgetSmart-${{ matrix.arch }}.dmg"
